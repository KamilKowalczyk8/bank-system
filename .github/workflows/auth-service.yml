name: Auth Service CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'auth-service/**'
      - 'bank-common/**'
    workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Krok 1 pobieranie kodu
      - name: Checkout code
        uses: actions/checkout@v4

      # Krok 2 przygotowanie javy
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Krok 3a budowanie jara ale najpierw biblioteka bank-common(dockerfile)
      - name: Build bank-common
        working-directory: ./bank-common
        run: mvn clean install -DskipTests

      # Krok 3b Zbudowanie właściwego serwisu
      - name: Build auth-service
        working-directory: ./auth-service
        run: mvn clean package -DskipTests

      # Krok 4 logowanie do dockera
      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # krok 5 budowanie obrazu dockera i wysyłanie
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          file: ./auth-service/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bank-auth-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bank-auth-service:${{ github.sha }}

      # krok 6 wdrożenie do kubernetesa
      - name: Deploy to Kubernetes
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          
          kubectl apply -f k8s/auth/
          
          kubectl set image deployment/auth-service-deployment \
            auth-service=${{ secrets.DOCKERHUB_USERNAME }}/bank-auth-service:${{ github.sha }}
            
            
            
            
            
