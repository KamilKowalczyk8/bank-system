name: Fraud Service CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'fraud-service/**'
      - 'bank-common/**'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  call-template:
    uses: ./.github/workflows/template-microservice-ci.yml
    with:
      service_name: 'fraud-service'
      service_location: 'fraud'
    secrets: inherit