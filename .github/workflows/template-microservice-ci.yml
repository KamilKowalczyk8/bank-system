name: Microservice CI Template

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_location:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # Krok 1 pobieranie kodu
    steps:
      - uses: actions/checkout@v4

      # Krok 2 przygotowanie javy
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Krok 3 budowanie jara ale najpierw biblioteka bank-common(dockerfile)
      - name: Build bank-common
        working-directory: ./bank-common
        run: mvn clean install -DskipTests

      # Krok 4 pobranie service_name i zbudowanie właściwego serwisu
      - name: Build ${{ inputs.service_name }}
        working-directory: ./${{ inputs.service_name }}
        run: mvn clean package -DskipTests

      # Krok 5 logowanie do dockera
      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # krok 6 budowanie obrazu dockera i wysyłanie
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ inputs.service_name }}
          file: ./${{ inputs.service_name }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bank-${{ inputs.service_name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/bank-${{ inputs.service_name }}:${{ github.sha }}


      # krok7 aktualizacja manifestu dla argocd
      - name: Update K8s manifest
        env:
          service: ${{ inputs.service_name }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          location: ${{ inputs.service_location }}
          sha: ${{ github.sha }}
        run: |
          # Konfiguracja wirtualnego uzykownika gita
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          
          cd ./k8s/$location
          
          sed -i "s|image: $username/bank-$service:.*|image: $username/bank-$service:$sha|g" $service.yaml
          
          git add $service.yaml
          git commit -m "Auto-update $service image tag to $sha [skip ci]" || echo "No changes to commit"
          
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main
          
            if git push; then
              echo "Sukces! Zmiany wypchnięte."
              exit 0
            fi
          
            echo "Kolizja z innym mikroserwisem! Próba $i z 5... Czekam na odblokowanie GitHuba."
            # Zatrzymuje skrypt na losowy czas (od 1 do 5 sekund), aby zniwelować równoczesne uderzenia
            sleep $((1 + RANDOM % 5))
          done
          
          echo "Błąd krytyczny: Nie udało się wypchnąć zmian po 5 próbach."
          exit 1