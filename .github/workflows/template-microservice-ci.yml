name: Microservice CI Template

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_location:
        required: true
        type: string

    # sekrety potrzbne
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
      # Krok 1: Pobieranie kodu (fetch-depth jest potrzebne do SonarCloud)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Krok 2: Przygotowanie Javy 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Krok 3: Cache dla Sonara
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Krok 4: Budowanie biblioteki wspólnej
      - name: Build bank-common
        working-directory: ./bank-common
        run: mvn clean install -DskipTests

      # Krok 5: TESTY, BRAMKA JAKOŚCI I SONARCLOUD
      # Jeśli testy padną, potok zatrzyma się w tym miejscu
      - name: Test and Analyze ${{ inputs.service_name }}
        working-directory: ./${{ inputs.service_name }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=KamilKowalczyk8_bank-system -Dsonar.organization=kamilkowalczyk8 -Dsonar.host.url=https://sonarcloud.io      # Krok 6: Logowanie do Dockera
      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Krok 7: Budowanie obrazu i push na Docker Hub
      - name: Update K8s manifest
        env:
          SERVICE: ${{ inputs.service_name }}
          USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          LOCATION: ${{ inputs.service_location }}
          SHA: ${{ github.sha }}

        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"

          cd ./k8s/${LOCATION}

          FILE="${SERVICE}.yaml"

          sed -i "s|image: ${USERNAME}/bank-${SERVICE}:.*|image: ${USERNAME}/bank-${SERVICE}:${SHA}|g" $FILE

          git add $FILE
          git commit -m "update ${SERVICE} image to ${SHA} [skip ci]" || echo "no changes"

          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main

            if git push; then
              echo "SUCCESS"
              exit 0
            fi

            echo "Retry $i/5"
            sleep $((1 + RANDOM % 5))
          done

          echo "FAILED"
          exit 1