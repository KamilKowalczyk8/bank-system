name: Payment Service CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'payment-service/**'
      - 'bank-common/**'

permissions:
  contents: write

jobs:
  call-template:
    uses: ./.github/workflows/template-microservice-ci.yml
    with:
      service_name: 'payment-service'
      service_location: 'payments'
    secrets: inherit