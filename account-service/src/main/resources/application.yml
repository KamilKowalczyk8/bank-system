server:
  port: 8084

spring:
  application:
    name: account-service

  datasource:
    url: jdbc:postgresql://localhost:5456/accountdb
    username: accountuser
    password: accountpass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true