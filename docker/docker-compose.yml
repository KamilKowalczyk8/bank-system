services:
    auth-postgres:
        image: postgres:16
        container_name: auth-postgres
        environment:
            POSTGRES_DB: authdb
            POSTGRES_USER: authuser
            POSTGRES_PASSWORD: authpass
        ports:
            - "5432:5432"
        volumes:
            - auth-postgres-data:/var/lib/postgresql/data

    customer-postgres:
        image: postgres:16
        container_name: customer-postgres
        ports:
            - "5455:5432" 
        environment:
            POSTGRES_DB: customerdb
            POSTGRES_USER: custouser
            POSTGRES_PASSWORD: custopass
        volumes:
            - customer-postgres-data:/var/lib/postgresql/data


    account-postgres:
        image: postgres:16
        container_name: account-postgres
        ports:
            - "5456:5432" 
        environment:
            POSTGRES_DB: accountdb
            POSTGRES_USER: accountuser
            POSTGRES_PASSWORD: accountpass
        volumes:
            - account-postgres-data:/var/lib/postgresql/data

    auth-mongo:
        image: mongo:7
        container_name: auth-mongo
        ports:
            - "27017:27017"
        volumes:
            - auth-mongo-data:/data/db


    api-redis:
        image: redis:7-alpine
        container_name: api-redis
        ports:
            - "6379:6379"

    kafka:
        image: confluentinc/confluent-local:7.5.0
        container_name: bank-kafka
        ports:
            - "9092:9092"
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092


volumes:
    auth-postgres-data:
    auth-mongo-data:
    customer-postgres-data:
    account-postgres-data: