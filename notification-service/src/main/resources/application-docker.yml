spring:
  kafka:
    bootstrap-servers: bank-kafka:29092

  mail:
    host: mailhog
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false


integrations:
  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}
  discord:
    webhook-url: ${DISCORD_WEBHOOK_URL:}