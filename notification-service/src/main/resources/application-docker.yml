spring:
  kafka:
    bootstrap-servers: bank-kafka:29092
    consumer:
      group-id: notification-group-v2 # nowa grupa druga
      auto-offset-reset: latest # tylko najnowsze wiadomosci
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false # ignoruje nagłówke __TypeId__ który wywala cały serwis

  mail:
    host: mailhog
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false


integrations:
  slack:
    webhook-url: ${SLACK_WEBHOOK_URL:}
  discord:
    webhook-url: ${DISCORD_WEBHOOK_URL:}