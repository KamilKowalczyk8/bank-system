server:
  port: 8081

spring:
  application:
    name: auth-service

  profiles:
    active: local # domyślnie

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# ---- ARGON2 KONFIGURACJA ----
bank:
  security:
    argon2:
      salt-length: 16
      hash-length: 32
      parallelism: 1
      memory: 65536
      iterations: 3

