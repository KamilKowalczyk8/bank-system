apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-db-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-db
  template:
    metadata:
      labels:
        app: account-db
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "accountdb"
            - name: POSTGRES_USER
              value: "accountuser"
            - name: POSTGRES_PASSWORD
              value: "accountpass"
---
apiVersion: v1
kind: Service
metadata:
  name: account-db
spec:
  selector:
    app: account-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432