apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service-deployment
spec:
  replicas: 1 # Jedna kopia
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service # etykieta do oznaczania poda
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: auth-service
          image: kamilkowalczyk8/bank-auth-service:dbf953d3ec3e798f5c2912b6d7760f9304fa2c39
          imagePullPolicy: Always #Mówi K8s, żeby szukał w internecie github
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://auth-db:5432/authdb"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-db-secret
                  key: password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092

---

apiVersion: v1
kind: Service
metadata:
  name: auth-service # Dzięki temu inne serwisy wywołają http://auth-service:8081
spec:
  selector:
    app: auth-service # Service szuka Podów z tą etykietą
  ports:
    - protocol: TCP
      port: 8081      # Port, na którym Service nasłuchuje
      targetPort: 8081 # Port, na który Service przekazuje ruch do Poda