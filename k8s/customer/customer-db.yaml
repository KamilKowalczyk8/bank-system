apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-db-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-db
  template:
    metadata:
      labels:
        app: customer-db
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "customerdb"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: customer-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: customer-db-secret
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: customer-db
spec:
  selector:
    app: customer-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432