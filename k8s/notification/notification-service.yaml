apiVersion: apps/v1
kind: Deployment
metadata: { name: notification-service-deployment }
spec:
  replicas: 1
  selector: { matchLabels: { app: notification-service } }
  template:
    metadata: { labels: { app: notification-service } }
    spec:
      containers:
        - name: notification-service
          image: kamilkowalczyk8/bank-notification-service:91523fcb75f016772c58c66e85f726358e973017
          imagePullPolicy: Always
          ports: [ { containerPort: 8085 } ]
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: SPRING_MAIL_HOST
              value: "mailhog"
            - name: SPRING_MAIL_PORT
              value: "1025"
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: discord-url
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: slack-url

---
apiVersion: v1
kind: Service
metadata: { name: notification-service }
spec:
  selector: { app: notification-service }
  ports: [ { protocol: TCP, port: 8085, targetPort: 8085 } ]