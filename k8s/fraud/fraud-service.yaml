apiVersion: apps/v1
kind: Deployment
metadata: { name: fraud-service-deployment }
spec:
  replicas: 1
  selector: { matchLabels: { app: fraud-service } }
  template:
    metadata: { labels: { app: fraud-service } }
    spec:
      containers:
        - name: fraud-service
          image: kamilkowalczyk8/bank-fraud-service:latest
          #imagePullPolicy: Never
          ports: [ { containerPort: 8089 } ]
          env:
            - { name: SPRING_PROFILES_ACTIVE, value: "docker" }
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://fraud-db:5432/fraudb" }
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fraud-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fraud-db-secret
                  key: password
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
---
apiVersion: v1
kind: Service
metadata: { name: fraud-service }
spec:
  selector: { app: fraud-service }
  ports: [ { protocol: TCP, port: 8089, targetPort: 8089 } ]