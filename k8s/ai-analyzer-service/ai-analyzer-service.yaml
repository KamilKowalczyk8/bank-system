apiVersion: apps/v1
kind: Deployment
metadata: { name: ai-analyzer-service-deployment }
spec:
  replicas: 1
  selector: { matchLabels: { app: ai-analyzer-service } }
  template:
    metadata: { labels: { app: ai-analyzer-service } }
    spec:
      containers:
        - name: ai-analyzer-service
          image: kamilkowalczyk8/bank-ai-analyzer-service:1228246f6bd728dce67c1849c4924d673fd35d1d
          imagePullPolicy: Always
          ports: [ { containerPort: 8086 } ]
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-analyzer-secret
                  key: gemini-api-key
---
apiVersion: v1
kind: Service
metadata: { name: ai-analyzer-service }
spec:
  selector: { app: ai-analyzer-service }
  ports: [ { protocol: TCP, port: 8086, targetPort: 8086 } ]