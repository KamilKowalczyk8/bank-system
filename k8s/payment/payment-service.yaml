apiVersion: apps/v1
kind: Deployment
metadata: { name: payment-service-deployment }
spec:
  replicas: 1
  selector: { matchLabels: { app: payment-service } }
  template:
    metadata: { labels: { app: payment-service } }
    spec:
      containers:
        - name: payment-service
          image: kamilkowalczyk8/bank-payment-service:latest
          imagePullPolicy: Never
          ports: [ { containerPort: 8088 } ]
          env:
            - { name: SPRING_PROFILES_ACTIVE, value: "docker" }
            - { name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://payment-db:5432/paymentdb" }
            - { name: SPRING_DATASOURCE_USERNAME, value: "paymentuser" }
            - { name: SPRING_DATASOURCE_PASSWORD, value: "paymentpass" }
            - { name: SPRING_KAFKA_BOOTSTRAP_SERVERS, value: "kafka:29092" }
---
apiVersion: v1
kind: Service
metadata: { name: payment-service }
spec:
  selector: { app: payment-service }
  ports: [ { protocol: TCP, port: 8088, targetPort: 8088 } ]