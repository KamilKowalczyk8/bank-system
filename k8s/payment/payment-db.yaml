apiVersion: apps/v1
kind: Deployment
metadata: { name: payment-db-deployment }
spec:
  replicas: 1
  selector: { matchLabels: { app: payment-db } }
  template:
    metadata: { labels: { app: payment-db } }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports: [ { containerPort: 5432 } ]
          env:
            - { name: POSTGRES_DB, value: "paymentdb" }
            - { name: POSTGRES_USER, value: "paymentuser" }
            - { name: POSTGRES_PASSWORD, value: "paymentpass" }
---
apiVersion: v1
kind: Service
metadata: { name: payment-db }
spec:
  selector: { app: payment-db }
  ports: [ { protocol: TCP, port: 5432, targetPort: 5432 } ]