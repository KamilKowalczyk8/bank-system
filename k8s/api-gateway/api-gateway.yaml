apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: kamilkowalczyk8/bank-api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: SERVICES_AUTH_URL
              value: "http://auth-service:8081"
            - name: SERVICES_CUSTOMER_URL
              value: "http://customer-service:8082"
            - name: SERVICES_ONBOARDING_URL
              value: "http://onboarding-service:8083"
            - name: SERVICES_CARD_URL
              value: "http://card-service:8087"
            - name: SERVICES_ACCOUNT_URL
              value: "http://account-service:8084"
            - name: SERVICES_PAYMENT_URL
              value: "http://payment-service:8088"
            - name: SERVICES_FRAUD_URL
              value: "http://fraud-service:8089"

---
# -----------------------------------------------------
# SERVICE: port 8080
# -----------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080